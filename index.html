<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ash Energy Terminal</title>

<style>

:root{
--bg:#000000;
--panel:#111111;
--border:#2b2b2b;
--amber:#ffb000;
--green:#00ff66;
--red:#ff4444;
--white:#ffffff;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:var(--bg);
color:var(--white);
padding:10px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#050505;
border:1px solid var(--amber);
margin-bottom:10px;
}

.logo{
font-size:28px;
font-weight:bold;
color:var(--amber);
}

.clock{
font-size:18px;
color:var(--amber);
}

.ribbon{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:8px;
margin-bottom:10px;
}

.ticker{
background:var(--panel);
border:1px solid var(--border);
padding:12px;
text-align:center;
}

.ticker-title{
color:var(--amber);
font-size:12px;
}

.ticker-value{
font-size:20px;
font-weight:bold;
margin-top:5px;
}

.main{
display:grid;
grid-template-columns:1fr 2fr 1fr;
gap:10px;
}

.panel{
background:var(--panel);
border:1px solid var(--border);
padding:10px;
border-radius:4px;
}

.panel h2{
color:var(--amber);
margin-bottom:10px;
font-size:18px;
}

table{
width:100%;
border-collapse:collapse;
}

td{
padding:8px;
border-bottom:1px solid #222;
}

.btn{
display:block;
padding:10px;
background:#1c1c1c;
margin-bottom:8px;
text-decoration:none;
color:white;
border-radius:4px;
}

.btn:hover{
background:#333;
}

textarea{
width:100%;
height:220px;
background:#000;
color:#fff;
border:1px solid #333;
padding:10px;
}

.checklist label{
display:block;
margin-bottom:10px;
}

@media(max-width:1200px){
.main{
grid-template-columns:1fr;
}
.ribbon{
grid-template-columns:repeat(2,1fr);
}
}

</style>
</head>

<body>

<div class="header">
<div class="logo">ASH ENERGY TERMINAL</div>
<div class="clock" id="clock"></div>
</div>

<div class="ribbon">

<div class="ticker">
<div class="ticker-title">BRENT</div>
<div class="ticker-value">LIVE</div>
</div>

<div class="ticker">
<div class="ticker-title">WTI</div>
<div class="ticker-value">LIVE</div>
</div>

<div class="ticker">
<div class="ticker-title">DXY</div>
<div class="ticker-value">LIVE</div>
</div>

<div class="ticker">
<div class="ticker-title">USD/SGD</div>
<div class="ticker-value">LIVE</div>
</div>

<div class="ticker">
<div class="ticker-title">VLSFO</div>
<div class="ticker-value">UPDATE</div>
</div>

<div class="ticker">
<div class="ticker-title">SIGNAL</div>
<div class="ticker-value">READY</div>
</div>

</div>

<div class="main">

<div class="panel">

<h2>CPP FREIGHT BOARD</h2>

<table>
<tr><td>TC1</td><td></td></tr>
<tr><td>TC5</td><td></td></tr>
<tr><td>TC20</td><td></td></tr>
<tr><td>TC12</td><td></td></tr>
<tr><td>TC14</td><td></td></tr>
<tr><td>TC17</td><td></td></tr>
</table>

<br>

<h2>DIRTY FREIGHT</h2>

<table>
<tr><td>TD3C</td><td></td></tr>
<tr><td>TD20</td><td></td></tr>
<tr><td>TD22</td><td></td></tr>
</table>

</div>

<div class="panel">

<h2>BRENT CHART</h2>

<h2>LIVE OIL MARKETS</h2>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">

<div class="tradingview-widget-container">
<div class="tradingview-widget-container__widget"></div>
<script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
{
"autosize": true,
"symbol": "ICEEUR:BRN1!",
"interval": "240",
"timezone": "Asia/Singapore",
"theme": "dark",
"style": "1",
"locale": "en",
"hide_top_toolbar": false,
"hide_legend": false,
"allow_symbol_change": true
}
</script>
</div>

<div class="tradingview-widget-container">
<div class="tradingview-widget-container__widget"></div>
<script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
{
"autosize": true,
"symbol": "NYMEX:CL1!",
"interval": "240",
"timezone": "Asia/Singapore",
"theme": "dark",
"style": "1",
"locale": "en",
"hide_top_toolbar": false,
"hide_legend": false,
"allow_symbol_change": true
}
</script>
</div>

</div>

</div>

<div class="panel">

<h2>QUICK LAUNCH</h2>

<a class="btn" href="https://app.signalocean.com" target="_blank">Signal Ocean</a>

<a class="btn" href="https://www.wsj.com" target="_blank">WSJ</a>

<a class="btn" href="https://www.barrons.com" target="_blank">Barron's</a>

<a class="btn" href="https://www.marketwatch.com" target="_blank">MarketWatch</a>

<a class="btn" href="https://shipandbunker.com" target="_blank">Ship & Bunker</a>

<a class="btn" href="https://www.opec.org" target="_blank">OPEC</a>

<a class="btn" href="https://www.eia.gov" target="_blank">EIA</a>

<br>

<h2>CHECKLIST</h2>

<div class="checklist">

<label><input type="checkbox"> Brent > 2%</label>
<label><input type="checkbox"> EFS Move</label>
<label><input type="checkbox"> TC5 Change</label>
<label><input type="checkbox"> TD3C Change</label>
<label><input type="checkbox"> Hormuz Update</label>
<label><input type="checkbox"> Refinery Outage</label>

</div>

</div>

</div>

<br>

<div class="panel">

<h2>BROKER NOTES</h2>

<textarea id="notes"></textarea>

</div>

<script>

function updateClock(){
const now = new Date().toLocaleString(
'en-SG',
{timeZone:'Asia/Singapore'}
);
document.getElementById('clock').innerHTML = now;
}

setInterval(updateClock,1000);
updateClock();

const notes=document.getElementById('notes');

notes.value=localStorage.getItem('brokerNotes') || '';

notes.addEventListener('keyup',()=>{
localStorage.setItem(
'brokerNotes',
notes.value
);
});

</script>


</body>
</html>
